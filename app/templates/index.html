<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AutoPay AI</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%E2%AC%A1%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Toast (top-right notification slot) -->
  <div id="toast"></div>  

  <!-- Top nav — JS toggles .hidden based on auth state -->
  <nav id="topnav" class="topnav hidden">
    <div class="topnav-inner">
      <a class="topnav-logo" href="#/dashboard">
        <span class="accent">&#x2B21;</span>
        AutoPay<span class="accent">AI</span>
      </a>
      <div class="topnav-tabs">
        <button class="nav-item" data-route="/dashboard" onclick="routeTo('/dashboard')">Dashboard</button>
        <button class="nav-item" data-route="/bills"     onclick="routeTo('/bills')">Bills</button>
        <button class="nav-item" data-route="/upload"    onclick="routeTo('/upload')">Upload</button>
        <button class="nav-item" data-route="/schedule"  onclick="routeTo('/schedule')">Schedule</button>
        <button class="nav-item" data-route="/wallet"    onclick="routeTo('/wallet')">Wallet</button>
        <button class="nav-item" data-route="/telegram"  onclick="routeTo('/telegram')">Telegram</button>
      </div>
      <div class="topnav-right">
        <span class="dot dot-off" id="nav-tg-dot" title="Telegram link status"></span>
        <span id="nav-user" class="font-mono text-xs text-mute"></span>
        <button class="btn-outline text-xs px-3 py-2" onclick="doLogout()">Logout</button>
      </div>
    </div>
    <!-- Mobile menu -->
    <div class="topnav-mobile" id="mobile-menu" style="display:flex;flex-direction:column;padding:0.5rem 1.5rem 1rem;gap:0.25rem;">
      <button class="nav-item" data-route="/dashboard" onclick="routeTo('/dashboard');toggleMobileMenu()">Dashboard</button>
      <button class="nav-item" data-route="/bills"     onclick="routeTo('/bills');toggleMobileMenu()">Bills</button>
      <button class="nav-item" data-route="/upload"    onclick="routeTo('/upload');toggleMobileMenu()">Upload</button>
      <button class="nav-item" data-route="/schedule"  onclick="routeTo('/schedule');toggleMobileMenu()">Schedule</button>
      <button class="nav-item" data-route="/wallet"    onclick="routeTo('/wallet');toggleMobileMenu()">Wallet</button>
      <button class="nav-item" data-route="/telegram"  onclick="routeTo('/telegram');toggleMobileMenu()">Telegram</button>
    </div>
  </nav>

  <!-- Single SPA mount point. The router in app.js renders one
       of the .page sections inside this element. -->
  <main id="app"></main>

  <script src="/static/app.js"></script>
</body>
</html>
