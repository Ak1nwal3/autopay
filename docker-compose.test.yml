name: nomba-gateway-test

services:
  db-test:
    image: postgres:16-alpine
    container_name: nomba-gateway-db-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: David*2020*
      POSTGRES_DB: nomba_gateway_test
    ports:
      - "5433:5432"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nomba_gateway_test"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - nomba-test-net

  app-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nomba-gateway-app-test
    environment:
      DATABASE_URL: postgresql://postgres:David*2020*@db-test:5432/nomba_gateway_test
      ENVIRONMENT: test
      LOG_LEVEL: WARNING
      JWT_SECRET_KEY: "test-jwt-secret-must-be-at-least-32-chars-long"
      GROQ_API_KEY: ""
    depends_on:
      db-test:
        condition: service_healthy
    command: ["pytest", "--cov=app", "--cov-report=term-missing"]
    volumes:
      - ./app:/code/app
      - ./tests:/code/tests
    networks:
      - nomba-test-net

networks:
  nomba-test-net:
    driver: bridge
